services:
  purimmonitor:
    build: ./PurimMonitor
    environment:
      PORT: 5000
    ports:
      - '5000:5000'
    restart: unless-stopped

  secureshare:
    build: ./SecureShare
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to at least 32 characters}
      MAX_UPLOADS: ${MAX_UPLOADS:-1000}
      PORT: 3000
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      UPLOAD_TTL_SECONDS: ${UPLOAD_TTL_SECONDS:-3600}
    ports:
      - '3000:3000'
    restart: unless-stopped
