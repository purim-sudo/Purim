apiVersion: apps/v1
kind: Deployment
metadata:
  name: purimmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: purimmonitor
  template:
    metadata:
      labels:
        app: purimmonitor
    spec:
      containers:
        - name: purimmonitor
          image: purimmonitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
