server {
    listen 80;
    server_tokens off;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /monitor/ {
        proxy_pass http://purimmonitor:5000/;
    }

    location /share/ {
        proxy_pass http://secureshare:3000/;
    }
}
